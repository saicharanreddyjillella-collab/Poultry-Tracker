version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: poultrytrack
      POSTGRES_USER: poultrytrack
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poultrytrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgres://poultrytrack:${DB_PASSWORD}@db:5432/poultrytrack
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${DOMAIN},${SERVER_IP},localhost
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/static
      - media_files:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://${DOMAIN:-${SERVER_IP}}/api
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/static
      - media_files:/app/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_files:
  media_files:
