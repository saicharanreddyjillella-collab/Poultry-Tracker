upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name sairamfeeds.in www.sairamfeeds.in;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name sairamfeeds.in www.sairamfeeds.in;

    ssl_certificate /etc/letsencrypt/live/sairamfeeds.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sairamfeeds.in/privkey.pem;

    client_max_body_size 10M;

    # API requests → Django
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files from Django
    location /static/ {
        alias /app/static/;
    }

    # Everything else → React frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
